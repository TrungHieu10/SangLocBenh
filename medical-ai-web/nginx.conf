server {
    listen 80;
    server_name medical-ai.me www.medical-ai.me;

    # Chuyển hướng toàn bộ truy cập http sang https
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name medical-ai.me www.medical-ai.me;

    # Đường dẫn tới chứng chỉ SSL của Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/medical-ai.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medical-ai.me/privkey.pem;

    # Cấu hình SSL nâng cao (Tùy chọn nhưng tốt cho bảo mật)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Sửa lỗi Google Login Popup bị chặn bởi Cross-Origin-Opener-Policy
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups";

    # Cho phép upload file tối đa 10MB (avatar)
    client_max_body_size 10M;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy cho hình ảnh Avatar được lưu ở dotnet-api
    location /avatars/ {
        proxy_pass http://dotnet-api:8080/avatars/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse proxy cho C# API
    location /api/ {
        proxy_pass http://dotnet-api:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'keep-alive';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 10M;
    }

    # Hỗ trợ React Router (catch-all cuối cùng)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
